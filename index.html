<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #eee; }
        .calc { background: #333; padding: 20px; border-radius: 15px; width: 90%; max-width: 300px; }
        #screen { width: 100%; height: 50px; font-size: 24px; text-align: right; margin-bottom: 10px; border: none; border-radius: 5px; padding: 5px; box-sizing: border-box; }
        .btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 20px; font-size: 18px; border: none; border-radius: 5px; cursor: pointer; background: #555; color: white; }
        .operator { background: #f39c12; }
        .equal { background: #27ae60; grid-column: span 2; }
        .clear { background: #e74c3c; grid-column: span 2; }
    </style>
</head>
<body>

<div class="calc">
    <input type="text" id="screen" disabled>
    <div class="btns">
        <button class="clear" onclick="clr()">Clear</button>
        <button class="operator" onclick="ins('/')">/</button>
        <button class="operator" onclick="ins('*')">×</button>
        
        <button onclick="ins('7')">7</button>
        <button onclick="ins('8')">8</button>
        <button onclick="ins('9')">9</button>
        <button class="operator" onclick="ins('-')">-</button>
        
        <button onclick="ins('4')">4</button>
        <button onclick="ins('5')">5</button>
        <button onclick="ins('6')">6</button>
        <button class="operator" onclick="ins('+')">+</button>
        
        <button onclick="ins('1')">1</button>
        <button onclick="ins('2')">2</button>
        <button onclick="ins('3')">3</button>
        <button onclick="eq()">=</button>
        
        <button onclick="ins('0')">0</button>
        <button onclick="ins('.')">.</button>
    </div>
</div>

<script>
    let s = document.getElementById('screen');
    function ins(val) { s.value += val; }
    function clr() { s.value = ""; }
    function eq() { 
        try { s.value = eval(s.value); } 
        catch { s.value = "Error"; } 
    }
</script>

</body>
</html>
